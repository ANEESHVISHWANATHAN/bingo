

 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tambola Game</title>
<style>
  /* Reset & base */
  body {
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f3f7;
    color: #333;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  #app {
    max-width: 900px;
    margin: 1rem auto 2rem;
    width: 95vw;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 12px rgb(0 0 0 / 0.1);
    padding: 16px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  header {
    text-align: center;
    font-weight: 700;
    font-size: 1.6rem;
    color: #144a92;
    letter-spacing: 2px;
  }
  #players {
    display: flex; gap: 1rem; overflow-x: auto;
    border-bottom: 2px solid #144a92;
    padding-bottom: 8px;
  }
  .player-card {
    flex: 0 0 auto;
    background: #e3eaff;
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
    width: 96px;
    box-shadow: 0 0 8px rgb(20 74 146 / 0.3);
    user-select: none;
  }
  .player-card.host {
    border: 2px solid #144a92;
  }
  .player-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 6px;
  }
  #ticket {
    margin-top: 1rem;
    overflow-x: auto;
  }
  table.ticket {
    border-collapse: collapse;
    width: 100%;
    max-width: 100%;
    table-layout: fixed;
  }
  table.ticket td {
    border: 1px solid #bbb;
    width: 10%;
    height: 48px;
    text-align: center;
    vertical-align: middle;
    font-weight: 600;
    font-size: 1.2rem;
    user-select: none;
    cursor: default;
    background: #fff;
    transition: background-color 0.3s ease;
  }
  table.ticket td.empty {
    background: #f4f4f4;
    cursor: default;
  }
  table.ticket td.marked {
    background: #3a86ff;
    color: white;
    font-weight: 700;
  }
  #number-draw {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 1rem;
    font-size: 2rem;
    font-weight: 700;
    color: #144a92;
  }
  #timer-bar {
    width: 100px;
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  #timer-fill {
    height: 100%;
    background: #3a86ff;
    width: 100%;
    transition: width 5s linear;
  }
  #stage-claims {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .claim-btn {
    background: #3a86ff;
    border: none;
    color: white;
    padding: 10px 16px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
  }
  .claim-btn:disabled {
    background: #a6c8ff;
    cursor: default;
  }
  #notifications {
    margin-top: 1rem;
    min-height: 28px;
    font-weight: 600;
    color: #d93025;
    text-align: center;
  }
  #standings {
    margin-top: 1rem;
    border-top: 2px solid #144a92;
    padding-top: 12px;
  }
  #standings h2 {
    text-align: center;
    color: #144a92;
    font-weight: 700;
    margin-bottom: 12px;
  }
  #standings table {
    width: 100%;
    border-collapse: collapse;
  }
  #standings th, #standings td {
    border: 1px solid #bbb;
    padding: 8px;
    text-align: center;
  }
  #standings th {
    background: #3a86ff;
    color: white;
  }
  /* Scrollbar for players */
  #players::-webkit-scrollbar {
    height: 6px;
  }
  #players::-webkit-scrollbar-thumb {
    background: #3a86ff;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div id="app">
  <header>BINGO - TAMBOLA</header>
  <div id="players" aria-label="Players list" role="list"></div>
  <div id="ticket-container">
    <table class="ticket" aria-label="Your Tambola Ticket"></table>
  </div>
  <div id="number-draw" aria-live="polite" aria-atomic="true" aria-relevant="additions">
    <div id="current-number">-</div>
    <div id="timer-bar" aria-hidden="true">
      <div id="timer-fill"></div>
    </div>
  </div>
  <div id="stage-claims" aria-label="Stage claim buttons">
    <button class="claim-btn" data-stage="ff" disabled>First Five (FF)</button>
    <button class="claim-btn" data-stage="fs" disabled>First Seven (FS)</button>
    <button class="claim-btn" data-stage="fr" disabled>First Row (FR)</button>
    <button class="claim-btn" data-stage="sr" disabled>Second Row (SR)</button>
    <button class="claim-btn" data-stage="tr" disabled>Third Row (TR)</button>
    <button class="claim-btn" data-stage="fg" disabled>Full Game (FG)</button>
  </div>
  <div id="notifications" role="alert" aria-live="assertive"></div>
  <div id="standings" hidden>
    <h2>Final Standings</h2>
    <table>
      <thead>
        <tr><th>Player</th><th>Points</th></tr>
      </thead>
      <tbody id="standings-body"></tbody>
    </table>
  </div>
</div>

<script>
(() => {
  // Parse URL params for plyrid, roomid, wscode
  const urlParams = new URLSearchParams(window.location.search);
  const plyrid = Number(urlParams.get('plyrid'));
  const roomid = urlParams.get('roomid');
  const wscode = urlParams.get('wscode');

  if (!roomid || isNaN(plyrid) || !wscode) {
    alert('Missing or invalid roomid, plyrid, or wscode in URL.');
    throw new Error('Invalid URL params');
  }

  // UI refs
  const playersDiv = document.getElementById('players');
  const ticketTable = document.querySelector('table.ticket');
  const currentNumberDiv = document.getElementById('current-number');
  const timerFill = document.getElementById('timer-fill');
  const claimButtons = document.querySelectorAll('.claim-btn');
  const notificationsDiv = document.getElementById('notifications');
  const standingsSection = document.getElementById('standings');
  const standingsBody = document.getElementById('standings-body');

  let ws;
  let players = [];
  let ticket = [];
  let markedNumbers = new Set();
  let lastCalledNumber = null;
  let numberTimerInterval = null;
  let numberTimerStart = null;
  let canClaim = false;

  // Stage claim limits per server logic:
  // ff=5, fs=7, fr=5, sr=5, tr=5, fg=15 (full ticket)
  const stageLimits = {
    ff: 5, fs: 7, fr: 5, sr: 5, tr: 5, fg: 15
  };

  // Track marked counts per stage
  const stageCounts = {
    ff: 0, fs: 0, fr: 0, sr: 0, tr: 0, fg: 0
  };

  // Helpers for ticket row ranges (row 0,1,2)
  // The ticket is 3 rows × 10 columns with 15 numbers total.
  // We will determine which numbers are in which row for claims.
  let rowIndexes = [[], [], []]; // indexes of ticket array numbers by row
  // For simplicity, rows defined as first 5 nums = row 0, next 5 = row 1, last 5 = row 2

  // But server just sends array of 15 numbers, no row data.
  // We'll just assign 0–4 index to row0, 5–9 row1, 10–14 row2
  // (This matches typical tambola ticket shape)

  function resetStageCounts() {
    for (const k in stageCounts) stageCounts[k] = 0;
  }

  function renderPlayers() {
    playersDiv.innerHTML = '';
    for (const p of players) {
      const card = document.createElement('div');
      card.className = 'player-card' + (p.plyrid === 0 ? ' host' : '');
      card.title = p.username + (p.plyrid === 0 ? ' (Host)' : '');
      card.setAttribute('role', 'listitem');

      const img = document.createElement('img');
      img.className = 'player-icon';
      img.src = p.icon || 'https://via.placeholder.com/48?text=?';
      img.alt = p.username + ' icon';
      card.appendChild(img);

      const nameSpan = document.createElement('span');
      nameSpan.textContent = p.username;
      card.appendChild(nameSpan);

      playersDiv.appendChild(card);
    }
  }

  function renderTicket() {
    ticketTable.innerHTML = '';
    // The ticket is 3 rows × 10 columns
    // We'll fill the 15 numbers in the ticket cells, other cells empty.
    // We'll highlight marked numbers

    for (let r = 0; r < 3; r++) {
      const tr = document.createElement('tr');
      for (let c = 0; c < 10; c++) {
        const td = document.createElement('td');

        // Calculate ticket index = r * 5 + c - tricky because each row has exactly 5 numbers distributed over 10 cells
        // But server gives just 15 numbers array, no position mapping.
        // We'll distribute numbers evenly: for row r, fill 5 random positions out of 10.
        // But since server's tickets are generated randomly and no mapping is provided, 
        // for simplicity, we'll render numbers sequentially row-wise left to right and pad empty cells after 5 numbers per row.

        // So row 0: ticket[0..4]
        // row 1: ticket[5..9]
        // row 2: ticket[10..14]

        const baseIdx = r * 5;
        if (c < 5) {
          const num = ticket[baseIdx + c];
          td.textContent = num;
          td.classList.add('filled');
          if (markedNumbers.has(num)) td.classList.add('marked');
          // Mark index for row tracking
          rowIndexes[r].push(baseIdx + c);
        } else {
          td.textContent = '';
          td.classList.add('empty');
        }
        tr.appendChild(td);
      }
      ticketTable.appendChild(tr);
    }
  }

  function updateTimer(seconds = 5) {
    if (numberTimerInterval) clearInterval(numberTimerInterval);
    timerFill.style.transition = 'none';
    timerFill.style.width = '100%';

    // trigger reflow for restart transition
    void timerFill.offsetWidth;

    timerFill.style.transition = `width ${seconds}s linear`;
    timerFill.style.width = '0%';

    numberTimerStart = Date.now();
  }

  function showNotification(msg, error = false) {
    notificationsDiv.textContent = msg;
    notificationsDiv.style.color = error ? '#d93025' : '#144a92';
  }

  function enableClaimButtons(enable) {
    claimButtons.forEach(btn => {
      btn.disabled = !enable;
    });
    canClaim = enable;
  }

  function canClaimStage(stage) {
    if (!canClaim) return false;
    // check if stage already claimed by this user (disable button if so)
    // We track claims by disabling button on claim
    const btn = [...claimButtons].find(b => b.dataset.stage === stage);
    return btn && !btn.disabled;
  }

  // Handle claim button click
  function onClaimClicked(e) {
    const stage = e.target.dataset.stage;
    if (!stage || !canClaimStage(stage)) return;

    if (!lastCalledNumber && stage !== 'fg') {
      showNotification('Wait for numbers to be called before claiming.', true);
      return;
    }

    // Send claim varclaim to server
    const claimMsg = {
      type: 'varclaim',
      var: stage,
      plyrid,
      roomid,
      timestamp: Date.now()
    };
    ws.send(JSON.stringify(claimMsg));
    showNotification(`Claim sent for ${stage.toUpperCase()}`, false);

    // Disable button for that stage after claim sent
    e.target.disabled = true;
  }

  // Mark a number on ticket (when called number matches a ticket number)
  function markNumber(num) {
    if (!ticket.includes(num)) return;
    if (markedNumbers.has(num)) return;
    markedNumbers.add(num);

    // Update stage counts
    // ff = first 5 numbers marked on ticket
    // fs = first 7
    // fr/sr/tr = numbers marked in first/second/third row
    // fg = full game (all 15 numbers)

    const index = ticket.indexOf(num);
    if (index === -1) return;

    // ff
    if (stageCounts.ff < 5) {
      stageCounts.ff++;
    }
    // fs
    if (stageCounts.fs < 7) {
      stageCounts.fs++;
    }
    // Check which row
    if (index >= 0 && index < 5) {
      stageCounts.fr++;
    } else if (index >= 5 && index < 10) {
      stageCounts.sr++;
    } else if (index >= 10 && index < 15) {
      stageCounts.tr++;
    }
    // fg
    stageCounts.fg++;

    renderTicket();

    // Enable claim buttons if limits reached
    for (const stage of Object.keys(stageLimits)) {
      if (stageCounts[stage] >= stageLimits[stage]) {
        // Enable claim button for this stage if not already disabled
        const btn = [...claimButtons].find(b => b.dataset.stage === stage);
        if (btn && btn.disabled === false) continue;
        if (btn) btn.disabled = false;
      }
    }
  }

  // Handle incoming WS messages
  function handleWsMessage(msg) {
    switch (msg.type) {
      case 'wssuccess':
        showNotification('Connected to game server.');
        break;

      case 'roomerr':
        showNotification('Room not found. Reload or check URL.', true);
        break;

      case 'plyrerror':
        showNotification('Player ID not found in room.', true);
        break;

      case 'wserror':
        showNotification('WebSocket code mismatch. Refresh page.', true);
        break;

      case 'userjoin':
        players = msg.users || [];
        renderPlayers();
        break;

      case 'someuserjoin':
        players.push({
          plyrid: msg.plyrid,
          username: msg.username,
          icon: msg.icon
        });
        renderPlayers();
        showNotification(`${msg.username} joined the game.`);
        break;

      case 'ticketsend':
        if (Array.isArray(msg.ticket)) {
          ticket = msg.ticket;
          markedNumbers.clear();
          resetStageCounts();
          rowIndexes = [[], [], []];
          renderTicket();
          enableClaimButtons(false);
          showNotification('Ticket received. Waiting for game to start...');
        }
        break;

      case 'numbercalled':
        lastCalledNumber = msg.number;
        currentNumberDiv.textContent = lastCalledNumber;
        updateTimer(5);
        markNumber(lastCalledNumber);
        enableClaimButtons(true);
        showNotification(`Number called: ${lastCalledNumber}`);
        break;

      case 'varupdate':
        // Another player claimed a stage variable
        // Optionally show a message and disable that stage's claim button globally
        // But since no global disable, just notify
        showNotification(`${msg.username} claimed ${msg.var.toUpperCase()}`);
        // Disable button for the stage if current user already claimed it? 
        // Not enough info, so we do not disable buttons on others' claims
        break;

      case 'gamestarts':
        showNotification('Game started!');
        break;

      case 'standingdone':
        // Show final standings
        if (Array.isArray(msg.standings)) {
          standingsSection.hidden = false;
          standingsBody.innerHTML = '';
          msg.standings
            .sort((a, b) => b.totalpoints - a.totalpoints)
            .forEach(p => {
              const tr = document.createElement('tr');
              const tdName = document.createElement('td');
              tdName.textContent = p.username || 'Player ' + p.plyrid;
              const tdPoints = document.createElement('td');
              tdPoints.textContent = p.totalpoints || 0;
              tr.appendChild(tdName);
              tr.appendChild(tdPoints);
              standingsBody.appendChild(tr);
            });
          showNotification('Game ended! See final standings below.');
        }
        break;

      default:
        console.warn('Unknown WS message type:', msg.type);
    }
  }

  function connectWebSocket() {
    ws = new WebSocket(`ws://${window.location.host}`);

    ws.onopen = () => {
      // Send page_entered message to join the game session
      const pageEnteredMsg = {
        type: 'page_entered',
        plyrid,
        roomid,
        wscode,
      };
      ws.send(JSON.stringify(pageEnteredMsg));
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleWsMessage(msg);
      } catch (e) {
        console.error('Invalid WS message', e);
      }
    };

    ws.onerror = (err) => {
      console.error('WebSocket error', err);
      showNotification('WebSocket error occurred.', true);
    };

    ws.onclose = () => {
      showNotification('Disconnected from server.', true);
      // Optionally try to reconnect or disable UI
      enableClaimButtons(false);
    };
  }

  claimButtons.forEach(btn => {
    btn.addEventListener('click', onClaimClicked);
  });

  connectWebSocket();
})();
</script>
</body>
</html>
