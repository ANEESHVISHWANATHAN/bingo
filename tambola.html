<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tambola Game</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f0f0; }
    .top-bar { display: flex; padding: 10px; background: #333; color: white; }
    .stage-icon { padding: 5px 10px; margin-right: 5px; border-radius: 5px; background: #555; cursor: pointer; }
    .stage-icon.enabled { background: green; }
    .stage-icon.claimed-by-player { background: blue; }
    .stage-icon.claimed-by-other { background: red; }
    .game-section { padding: 20px; text-align: center; position: relative; }
    .game-top { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; }
    #number-counter { font-size: 24px; font-weight: bold; color: darkred; }
    #number-shower { font-size: 32px; margin: 0 20px; }
    #ticket { display: inline-block; margin-top: 20px; }
    .row { display: flex; }
    .cell { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
    .cell.filled { background: #fff; font-weight: bold; }
    .cell.marked { background: #aaffaa; }
    .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
               background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999; }
    .overlay-header { text-align: right; }
    .overlay-close { font-size: 24px; background: none; border: none; color: white; cursor: pointer; }
    .blurred { filter: blur(2px); }
    #number-map { display: flex; flex-wrap: wrap; gap: 4px; padding: 20px; background: white; max-width: 600px; }
    #number-map div { width: 30px; height: 30px; text-align: center; line-height: 30px; border: 1px solid #ccc; }
    .called { background: green; color: white; }
    .not-called { background: red; color: white; }
    #number-map-button { margin-top: 20px; padding: 10px 20px; }
    .claim-popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                   background: #333; color: white; padding: 10px 20px; border-radius: 5px; display: none; }
    .claim-popup.show { display: block; }
  </style>
</head>
<body>
  <div class="top-bar" id="top-bar">
    <div class="stage-icon" data-stage="ff">FF</div>
    <div class="stage-icon" data-stage="fs">FS</div>
    <div class="stage-icon" data-stage="fr">FR</div>
    <div class="stage-icon" data-stage="sr">SR</div>
    <div class="stage-icon" data-stage="tr">TR</div>
    <div class="stage-icon" data-stage="fg">FG</div>
  </div>

  <div class="game-section" id="game-section">
    <div class="game-top">
      <div id="number-counter">99</div>
      <div id="number-shower">--</div>
      <div id="timer">--</div>
    </div>

    <div id="ticket"></div>
    <button id="number-map-button">View Called Numbers</button>
  </div>

  <div class="overlay" id="stage-overlay">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeOverlay('stage-overlay')">×</button>
    </div>
    <div id="stage-entries"><h2>Stage Leaderboard</h2></div>
  </div>

  <div class="overlay" id="map-overlay">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeOverlay('map-overlay')">×</button>
    </div>
    <div id="number-map"><h2>Called Numbers Map</h2></div>
  </div>

  <div class="claim-popup" id="claim-popup"></div>

  <script>
    const TOTAL_NUMBERS = 90;
    let ws;
    let roomid, plyrid, wscode, username;
    let calledNumbers = [];
    let markedNumbers = new Set();
    let rowMarkedCounts = [0, 0, 0];
    let playerTicket = [];
    let claimedStages = { ff: {}, fs: {}, fr: {}, sr: {}, tr: {}, fg: {} };
    let stageLeaderboards = {};
    let numberCounter = 99;

    window.onload = () => {
      roomid = localStorage.getItem('roomid');
      plyrid = localStorage.getItem('plyrid');
      wscode = localStorage.getItem('wscode');
      username = localStorage.getItem('username') || `P${plyrid}`;

      if (!roomid || !plyrid || !wscode) return console.error("Missing room info.");

      ws = new WebSocket(location.origin.replace(/^http/, 'ws'));

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'page_entered', roomid, plyrid, wscode, wsindex: 2 }));
      };

      ws.onmessage = evt => {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'ticketsend') {
          renderTicket(msg.ticket);
          calledNumbers = [];
        }
        if (msg.type === 'numbercalled') {
          if (numberCounter > 0) numberCounter--;
          document.getElementById('number-counter').textContent = numberCounter;
          calledNumbers.push(msg.number);
          highlightNumber(msg.number);
        }
        if (msg.type === 'varupdate') {
          const st = msg.var;
          const cid = msg.plyrid, un = msg.username, arrid = msg.arrid, totPlayers = msg.totalPlayers;
          const pts = totPlayers - arrid, isKing = (arrid === 0);
          claimedStages[st] = { claimedBy: cid, username: un, isClaimable: false };
          if (!stageLeaderboards[st]) stageLeaderboards[st] = [];
          stageLeaderboards[st].push({ username: un, points: pts, isKing, profilePic: msg.icon });
          updateStageIcons();
        }
        if (msg.type === 'initial_game_state') {
          if (msg.calledNumbers) {
            calledNumbers = msg.calledNumbers;
            numberCounter = 99 - calledNumbers.length;
            document.getElementById('number-counter').textContent = numberCounter;
            if (msg.ticket) renderTicket(msg.ticket);
          }
          if (msg.claimedStagesData) {
            Object.assign(claimedStages, msg.claimedStagesData);
            Object.keys(msg.claimedStagesData).forEach(st => {
              const d = msg.claimedStagesData[st];
              if (d.claimedBy) {
                const pts = msg.totalPlayers - d.arrid;
                if (!stageLeaderboards[st]) stageLeaderboards[st] = [];
                stageLeaderboards[st].push({
                  username: d.username,
                  points: pts,
                  isKing: d.arrid === 0,
                  profilePic: d.profilePic
                });
              }
            });
            updateStageIcons();
          }
        }
      };

      document.getElementById('number-map-button').onclick = () => {
        document.getElementById('map-overlay').style.display = 'flex';
        document.getElementById('game-section').classList.add('blurred');
        updateNumberMap();
      };
    };

    function renderTicket(data) {
      playerTicket = [].concat(...data);
      document.getElementById('ticket').innerHTML = '';
      markedNumbers.clear();
      rowMarkedCounts = [0, 0, 0];
      data.forEach((rowArr, r) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';
        rowArr.forEach(num => {
          const c = document.createElement('div');
          c.className = 'cell';
          if (num !== null) {
            c.textContent = num;
            c.dataset.num = num;
            c.classList.add('filled');
          }
          rowDiv.appendChild(c);
        });
        document.getElementById('ticket').appendChild(rowDiv);
      });
    }

    let countdownInterval;
    function startCountdown() {
      let t = 5;
      clearInterval(countdownInterval);
      document.getElementById('timer').textContent = t;
      countdownInterval = setInterval(() => {
        t--;
        if (t < 0) t = 0;
        document.getElementById('timer').textContent = t;
        if (t <= 0) clearInterval(countdownInterval);
      }, 1000);
    }

    function highlightNumber(num) {
      document.getElementById('number-shower').textContent = num;
      startCountdown();
      document.querySelectorAll('.cell.filled').forEach(cell => {
        if (parseInt(cell.dataset.num) === num && !markedNumbers.has(num)) {
          cell.classList.add('marked');
          markedNumbers.add(num);
          const rowIndex = Array.from(cell.parentElement.parentElement.children).indexOf(cell.parentElement);
          rowMarkedCounts[rowIndex]++;
        }
      });
      suggestClaimStages();
      if (document.getElementById('map-overlay').style.display === 'flex') updateNumberMap();
    }

    function updateStageIcons() {
      document.querySelectorAll('.stage-icon').forEach(icon => {
        const st = icon.dataset.stage;
        icon.classList.remove('enabled', 'claimed-by-player', 'claimed-by-other');
        icon.onclick = null;
        const cs = claimedStages[st];
        if (cs.claimedBy) {
          icon.onclick = () => openStageOverlay(st);
          icon.textContent = st.toUpperCase();
          icon.classList.add(cs.claimedBy === plyrid ? 'claimed-by-player' : 'claimed-by-other');
        } else if (cs.isClaimable) {
          icon.classList.add('enabled');
          icon.onclick = () => attemptClaim(st);
          icon.textContent = st.toUpperCase();
        } else {
          icon.textContent = st.toUpperCase();
        }
      });
    }

    function suggestClaimStages() {
      const total = markedNumbers.size;
      for (let st in claimedStages) {
        const cond =
          (st === 'ff' && total >= 5) ||
          (st === 'fs' && total >= 7) ||
          (st === 'fr' && rowMarkedCounts[0] === 5) ||
          (st === 'sr' && rowMarkedCounts[1] === 5) ||
          (st === 'tr' && rowMarkedCounts[2] === 5) ||
          (st === 'fg' && total === 15);
        if (cond && !claimedStages[st].claimedBy) {
          claimedStages[st].isClaimable = true;
          updateStageIcons();
        }
      }
    }

    function attemptClaim(stage) {
      document.getElementById('claim-popup').textContent = "Stage claimed";
      document.getElementById('claim-popup').classList.add('show');
      setTimeout(() => document.getElementById('claim-popup').classList.remove('show'), 1500);
      ws.send(JSON.stringify({ type: 'varclaim', var: stage, plyrid, roomid, timestamp: Date.now() }));
    }

    function openStageOverlay(stage) {
      document.getElementById('stage-overlay').style.display = 'flex';
      document.getElementById('game-section').classList.add('blurred');
      const ctr = document.getElementById('stage-entries');
      ctr.innerHTML = `<h2>${stage.toUpperCase()}</h2>`;
      (stageLeaderboards[stage] || []).forEach(e => {
        const row = document.createElement('div'); row.className = 'entry-row';
        const ic = document.createElement('div'); ic.className = 'entry-icon';
        ic.style.backgroundImage = `url(${e.profilePic || 'https://via.placeholder.com/45'})`;
        const un = document.createElement('div'); un.textContent = e.username;
        const pt = document.createElement('div'); pt.textContent = `${e.points} Pts`;
        row.append(ic, un, pt); ctr.appendChild(row);
      });
    }

    function closeOverlay(id) {
      document.getElementById(id).style.display = 'none';
      document.getElementById('game-section').classList.remove('blurred');
    }

    function updateNumberMap() {
      const mp = document.getElementById('number-map');
      mp.innerHTML = '<h2>Called Numbers Map</h2>';
      const set = new Set(calledNumbers);
      for (let i = 1; i <= TOTAL_NUMBERS; i++) {
        const d = document.createElement('div');
        d.textContent = i;
        d.className = (set.has(i) ? 'called' : 'not-called');
        mp.appendChild(d);
      }
    }
  </script>
</body>
</html>
