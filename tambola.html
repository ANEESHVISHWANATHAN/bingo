

  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tambola Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    /* --- Your original CSS (no changes) --- */
    body {
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      background: #fefefe;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .blurred {
      filter: blur(5px);
    }
    .top-bar {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      background: linear-gradient(90deg, #dff9fb, #c7ecee);
      border-bottom: 4px solid;
      border-image: linear-gradient(90deg, #00cec9, #6c5ce7) 1;
      padding: 10px 0;
    }
    .top-bar::-webkit-scrollbar {
      display: none;
    }
    .stage-icon {
      flex: 0 0 auto;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #b2bec3;
      color: #2d3436;
      font-size: 18px;
      line-height: 60px;
      text-align: center;
      margin: 0 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      opacity: 0.6;
    }
    .stage-icon.enabled {
      background: #55efc4;
      opacity: 1;
      cursor: pointer;
    }
    .game-section {
      flex: 1;
      padding: 40px 10px 60px;
      background: linear-gradient(to bottom, #fdfbfb, #ebedee);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }
    .game-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    #number-shower {
      font-size: 64px;
      color: #333;
      font-weight: bold;
      animation: pulse 2s infinite;
      text-align: center;
      flex: 1;
    }
    #timer,
    #number-tracker {
      min-width: 100px;
      text-align: center;
      font-size: 20px;
    }
    #ticket {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 50px auto;
      background: #fff;
      border: 2px solid #000;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .row {
      display: flex;
    }
    .cell {
      width: 10%;
      height: 40px;
      border: 1px solid #ccc;
      line-height: 40px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
    }
    .filled {
      background-color: #ffe;
    }
    .marked {
      background-color: #4caf50;
      color: white;
    }
    #number-map-button {
      display: none;
      margin: 40px auto 0 auto;
      padding: 12px 24px;
      background-color: #6c5ce7;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
      transition: background-color 0.3s;
    }
    #number-map-button:hover {
      background-color: #341f97;
    }
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
    .overlay {
      position: fixed;
      top: 40px;
      bottom: 40px;
      left: 40px;
      right: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      z-index: 100;
      display: none;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }
    .overlay-header {
      display: flex;
      justify-content: flex-end;
    }
    .overlay-close {
      background: red;
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }
    .entry-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0;
    }
    .entry-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 15px;
      position: relative;
    }
    .entry-icon.king::before {
      content: "👑";
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
    }
    .entry-username {
      flex: 1;
      font-size: 16px;
      text-align: center;
    }
    .entry-points {
      font-weight: bold;
      margin-left: 15px;
    }
    .claim-popup {
      position: absolute;
      top: 50%;
      left: 100%;
      transform: translateY(-50%);
      padding: 12px 20px;
      font-size: 22px;
      background: #81ecec;
      color: #2d3436;
      border: 2px solid #00cec9;
      border-radius: 10px;
      font-weight: bold;
      text-shadow: 0 0 3px #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: all 0.8s ease;
    }
    .claim-popup.show {
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 1;
    }
    #number-map {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    #number-map div {
      padding: 14px 0;
      text-align: center;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
    }
    @media (min-width: 768px) {
      .top-bar {
        justify-content: space-evenly;
        overflow-x: hidden;
      }
      .stage-icon {
        margin: 0;
      }
      .game-top {
        gap: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar" id="stage-tabs">
    <div class="stage-icon" data-stage="ff">FF</div>
    <div class="stage-icon" data-stage="fs">FS</div>
    <div class="stage-icon" data-stage="fr">FR</div>
    <div class="stage-icon" data-stage="sr">SR</div>
    <div class="stage-icon" data-stage="tr">TR</div>
    <div class="stage-icon" data-stage="fg">FG</div>
  </div>

  <div class="game-section" id="game-section">
    <div class="game-top">
      <div id="number-tracker">--</div>
      <div id="number-shower">--</div>
      <div id="timer">--</div>
    </div>

    <div id="ticket"></div>
    <button id="number-map-button">View Called Numbers</button>
  </div>

  <div class="overlay" id="stage-overlay">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeOverlay()">×</button>
    </div>
    <div id="stage-entries"></div>
  </div>

  <div class="overlay" id="map-overlay">
    <div class="overlay-header">
      <button class="overlay-close" onclick="closeMap()">×</button>
    </div>
    <div id="number-map"></div>
  </div>

  <div class="claim-popup" id="claim-popup"></div>

  <!-- ... keep your existing HTML ... -->

<script>
  // Your existing variables
  let claimedStages = {
    ff: false,
    fs: false,
    fr: false,
    sr: false,
    tr: false,
    fg: false
  };

  // To track who claimed what and their points for tooltips
  const stageClaimInfo = {
    ff: null,
    fs: null,
    fr: null,
    sr: null,
    tr: null,
    fg: null
  };

  // === Check and claim stages ===
  function checkStages() {
    let matched = filledNumbers.filter(f => markedNumbers.has(f.num));
    let rowMatch = [0, 0, 0];
    matched.forEach(m => rowMatch[m.row]++);

    let stages = {
      ff: matched.length >= 5,
      fs: matched.length >= 7,
      fr: rowMatch[0] === 5,
      sr: rowMatch[1] === 5,
      tr: rowMatch[2] === 5,
      fg: matched.length === 15
    };

    let labels = {
      ff: "First Five",
      fs: "First Seven",
      fr: "First Row",
      sr: "Second Row",
      tr: "Third Row",
      fg: "Full Game"
    };

    for (let stage in stages) {
      if (stages[stage] && !claimedStages[stage]) {
        // Prevent any claims if FG is already claimed
        if (claimedStages.fg) {
          // Game over - no further claims
          return;
        }

        claimedStages[stage] = true;
        stageClaimInfo[stage] = { plyrId: plyrid, points: matched.length }; // store claimant & points

        const icon = document.querySelector(`.stage-icon[data-stage="${stage}"]`);
        icon.classList.add('enabled');
        icon.title = `${labels[stage]} claimed by You (${matched.length} points)`;
        icon.style.pointerEvents = 'auto'; // enable click

        icon.onclick = () => openStageOverlay(stage);

        // Notify server about claim
        ws.send(JSON.stringify({
          type: "claimstage",
          roomid,
          plyrid,
          stage,
        }));

        showClaimPopup(`${labels[stage]} Claimed!`);

        // If Full Game claimed, disable all others
        if(stage === 'fg') {
          disableAllStagesExcept('fg');
        }
      }
    }
  }

  // === Disable all stages except given one (used after FG claim) ===
  function disableAllStagesExcept(exceptStage) {
    for (let stage in claimedStages) {
      const icon = document.querySelector(`.stage-icon[data-stage="${stage}"]`);
      if(stage !== exceptStage) {
        icon.classList.remove('enabled');
        icon.onclick = null;
        icon.style.pointerEvents = 'none';
        icon.title = `${stage.toUpperCase()} disabled - game ended`;
      }
    }
  }

  // === Mark stage claimed by any player (including others) ===
  function markStageClaimed(stage, claimantPlyrId, claimantPoints) {
    if (!claimedStages[stage]) {
      claimedStages[stage] = true;
      stageClaimInfo[stage] = { plyrId: claimantPlyrId, points: claimantPoints };

      const labels = {
        ff: "First Five",
        fs: "First Seven",
        fr: "First Row",
        sr: "Second Row",
        tr: "Third Row",
        fg: "Full Game"
      };

      const icon = document.querySelector(`.stage-icon[data-stage="${stage}"]`);
      icon.classList.add('enabled');
      icon.title = `${labels[stage]} claimed by Player ${claimantPlyrId} (${claimantPoints} points)`;
      icon.style.pointerEvents = 'auto';
      icon.onclick = () => openStageOverlay(stage);

      showClaimPopup(`Stage ${stage.toUpperCase()} claimed by Player ${claimantPlyrId}`);

      // If Full Game claimed, disable all others
      if(stage === 'fg') {
        disableAllStagesExcept('fg');
      }
    }
  }

  // === Open overlay for stage ===
  function openStageOverlay(stage) {
    document.getElementById('stage-overlay').style.display = 'flex';
    document.getElementById('game-section').classList.add('blurred');

    // Fetch real player data for the stage (dummy data here)
    // TODO: Replace this with real data from server or state
    // For demo, using claimant info stored for tooltip as "king"
    let entries = [];

    // Example: show player who claimed it as king, others as normal
    if(stageClaimInfo[stage]) {
      entries.push({
        icon: "profile.jpg",
        username: `Player ${stageClaimInfo[stage].plyrId}`,
        points: stageClaimInfo[stage].points,
        isKing: true
      });
    }
    // Add other players or rankings here if you want...

    let container = document.getElementById('stage-entries');
    container.innerHTML = '';
    entries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry-row';

      const icon = document.createElement('div');
      icon.className = 'entry-icon';
      if (e.isKing) icon.classList.add('king');

      const username = document.createElement('div');
      username.className = 'entry-username';
      username.textContent = e.username;

      const points = document.createElement('div');
      points.className = 'entry-points';
      points.textContent = e.points;

      row.appendChild(icon);
      row.appendChild(username);
      row.appendChild(points);

      container.appendChild(row);
    });
  }

  // === Close stage overlay ===
  function closeOverlay() {
    document.getElementById('stage-overlay').style.display = 'none';
    document.getElementById('game-section').classList.remove('blurred');
  }

  // === Claim popup ===
  let claimPopupTimeout = null;
  function showClaimPopup(text) {
    const popup = document.getElementById('claim-popup');
    popup.textContent = text;
    popup.classList.add('show');
    if (claimPopupTimeout) clearTimeout(claimPopupTimeout);
    claimPopupTimeout = setTimeout(() => {
      popup.classList.remove('show');
    }, 3000);
  }

  // === Number map overlay ===
  document.getElementById('number-map-button').addEventListener('click', () => {
    updateNumberMap();
    document.getElementById('map-overlay').style.display = 'flex';
    document.getElementById('game-section').classList.add('blurred');
  });

  function updateNumberMap() {
    const container = document.getElementById('number-map');
    container.innerHTML = '';
    for(let i = 1; i <= totalNumbers; i++) {
      const div = document.createElement('div');
      div.textContent = i;
      div.className = 'number-cell';
      if(calledNumbers.includes(i)) {
        div.style.backgroundColor = '#55efc4';
        div.style.color = '#2d3436';
        div.classList.add('called');
      } else {
        div.style.backgroundColor = '#b2bec3';
        div.style.color = '#636e72';
        div.classList.remove('called');
      }
      container.appendChild(div);
    }
  }

  function closeMap() {
    document.getElementById('map-overlay').style.display = 'none';
    document.getElementById('game-section').classList.remove('blurred');
  }

  // === Keyboard support to close overlays with ESC ===
  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') {
      // Close any open overlays
      if(document.getElementById('stage-overlay').style.display === 'flex') {
        closeOverlay();
      }
      if(document.getElementById('map-overlay').style.display === 'flex') {
        closeMap();
      }
    }
  });

  // === WebSocket onmessage handler addition ===
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    // Existing message handlers ...

    // Handle claimstage messages from server
    if(data.type === 'claimstage') {
      // data: { type, roomid, plyrid, stage, points? }
      // Use points if sent, fallback to null
      const claimantPoints = data.points ?? null;
      markStageClaimed(data.stage, data.plyrid, claimantPoints);
    }

    // ... other message handlers you have
  };

  // === Styling enhancements for hover on stage icons ===
  // Add CSS dynamically (or add to your stylesheet)
  const style = document.createElement('style');
  style.textContent = `
    .stage-icon.enabled {
      cursor: pointer;
      transition: transform 0.15s ease-in-out;
    }
    .stage-icon.enabled:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 5px #2ecc71);
    }
    .stage-icon:not(.enabled) {
      opacity: 0.4;
      pointer-events: none;
    }

    #number-map {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    .number-cell {
      text-align: center;
      padding: 6px;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.5s ease;
    }
    .number-cell.called {
      animation: pulse 1.5s infinite alternate;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 8px 3px #55efc4; }
      100% { box-shadow: 0 0 0 0 #55efc4; }
    }

    /* Tooltip styling if needed */
    .stage-icon[title]:hover::after {
      content: attr(title);
      position: absolute;
      background: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.8em;
      pointer-events: none;
      opacity: 0.8;
    }
  `;
  document.head.appendChild(style);

  // === Initial connect ===
  connectWS();
</script>
</body>
</html>
