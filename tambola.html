<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambola Game</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      background: linear-gradient(90deg, #84fab0, #8fd3f4);
      padding: 10px 0;
      width: 100%;
      border-bottom: 2px solid #ccc;
    }

    .stage-tab {
      flex: 0 0 auto;
      background: white;
      padding: 10px 20px;
      margin: 0 10px;
      border-radius: 20px;
      font-weight: bold;
      border: 2px solid #4caf50;
      color: #4caf50;
    }

    .stage-tab.claimed {
      background-color: #4caf50;
      color: white;
    }

    .number-display {
      margin: 20px 0 10px;
      font-size: 48px;
      font-weight: bold;
      color: #333;
      position: relative;
    }

    .timer {
      font-size: 18px;
      color: #555;
      margin-bottom: 10px;
    }

    #ticket {
      display: inline-block;
      border: 2px solid #000;
      margin-top: 10px;
      background: white;
    }

    .row {
      display: flex;
    }

    .cell {
      width: 40px;
      height: 40px;
      border: 1px solid #ccc;
      line-height: 40px;
      text-align: center;
      font-weight: bold;
    }

    .filled {
      background-color: #ffe;
    }

    .marked {
      background-color: #4caf50;
      color: white;
    }

    #claimBtn {
      margin: 20px auto;
      display: none;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background-color: #4caf50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Top stage swipe bar -->
<div class="top-bar">
  <div id="ff" class="stage-tab">FF</div>
  <div id="fs" class="stage-tab">FS</div>
  <div id="fr" class="stage-tab">FR</div>
  <div id="sr" class="stage-tab">SR</div>
  <div id="tr" class="stage-tab">TR</div>
  <div id="fg" class="stage-tab">FG</div>
</div>

<!-- Number responder + timer -->
<div class="number-display" id="numberDisplay">Waiting...</div>
<div class="timer" id="timer">00:00</div>

<!-- Ticket area -->
<div id="ticket"></div>

<!-- Claim button -->
<button id="claimBtn">Claim</button>

<script>
let ws;
let filledNumbers = [];
let markedNumbers = new Set();
let rowCount = [0, 0, 0];
let claimed = {
  ff: false, fs: false, fr: false, sr: false, tr: false, fg: false
};
let drawStarted = false;
let timerInterval;
let secondsLeft = 5;

const roomid = localStorage.getItem('roomid');
const plyrid = parseInt(localStorage.getItem('plyrid'));
const wscode = localStorage.getItem('wscode');

function renderTicket(ticket) {
  const container = document.getElementById('ticket');
  container.innerHTML = '';
  filledNumbers = [];
  rowCount = [0, 0, 0];
  markedNumbers.clear();

  for (let r = 0; r < 3; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    let numsThisRow = ticket.slice(r * 5, r * 5 + 5);
    let filledPositions = new Set();

    while (filledPositions.size < 5) {
      filledPositions.add(Math.floor(Math.random() * 10));
    }

    for (let c = 0; c < 10; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (filledPositions.has(c)) {
        const num = numsThisRow.pop();
        cell.textContent = num;
        cell.dataset.num = num;
        cell.classList.add('filled');
        filledNumbers.push({ num, row: r });
      }
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}

function checkAndClaim() {
  if (!claimed.ff && markedNumbers.size >= 5) claimStage('ff');
  if (!claimed.fs && markedNumbers.size >= 7) claimStage('fs');
  if (!claimed.fr && rowCount[0] === 5) claimStage('fr');
  if (!claimed.sr && rowCount[1] === 5) claimStage('sr');
  if (!claimed.tr && rowCount[2] === 5) claimStage('tr');
  if (!claimed.fg && markedNumbers.size === 15) claimStage('fg');
}

function claimStage(stage) {
  claimed[stage] = true;
  const el = document.getElementById(stage);
  if (el) el.classList.add('claimed');

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'varclaim',
      var: stage,
      plyrid,
      roomid,
      timestamp: Date.now()
    }));
  }
}

function highlightNumber(called) {
  const cells = document.querySelectorAll('.filled');
  for (const cell of cells) {
    const num = parseInt(cell.dataset.num);
    if (num === called && !markedNumbers.has(num)) {
      cell.classList.add('marked');
      markedNumbers.add(num);
      const rIndex = Array.from(cell.parentElement.parentElement.children).indexOf(cell.parentElement);
      rowCount[rIndex]++;
      break;
    }
  }
  checkAndClaim();
}

function updateTimer() {
  document.getElementById('timer').textContent = `00:0${secondsLeft}`;
  secondsLeft--;
  if (secondsLeft < 0) clearInterval(timerInterval);
}

ws = new WebSocket(location.origin.replace(/^http/, 'ws'));

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'page_entered', roomid, plyrid, wscode }));
};

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  if (msg.type === 'wssuccess') {
    console.log('WS connection successful.');
  }

  if (msg.type === 'ticketsend') {
    renderTicket(msg.ticket);
  }

  if (msg.type === 'numcalled') {
    document.getElementById('numberDisplay').textContent = msg.number;
    highlightNumber(msg.number);

    if (!drawStarted) {
      drawStarted = true;
      document.getElementById('claimBtn').style.display = 'inline-block';
    }

    secondsLeft = 5;
    clearInterval(timerInterval);
    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
  }

  if (msg.type === 'varupdate') {
    const el = document.getElementById(msg.var);
    if (el) el.textContent = `${msg.var.toUpperCase()} by ${msg.username}`;
    el.classList.add('claimed');
  }
};

// Optional: hook claim button to claim manually if needed
document.getElementById('claimBtn').onclick = () => {
  checkAndClaim(); // force re-check and auto-claim any eligible stages
};
</script>

</body>
</html>
