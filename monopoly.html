<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monopoly Game</title>
</head>
<style>
  :root {
      --bar-width: 100%;
      --bar-height: 100px;
      --row-height: 60px;
      --icon-size: 30px;
      --font-size: 18px;
      --row-gap: 10%; /* or any percent you prefer */
    }

    body {
      margin: 0;
      background: #0e0c1f;
      font-family: 'VT323', monospace;
      overflow-y:allow;
      
      
    }
    
.pointer {
  
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 18px;
  
}

/* Hide pointer by default */
.outer-row .pointer {
  display: none;
}

/* Show pointer only for active player */
.outer-row.active .pointer {
  display: block;
}
.pointer svg {
  width: 70%;
  height: 70%;
  transform: rotate(180deg); /* left-tilted arrow */
  fill: white;
  filter: drop-shadow(0 0 5px white);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1) rotate(180deg); }
  50% { transform: scale(1.15) rotate(180deg); }
}

    .live-bar-container {
  position:absolute;
  bottom:0;
  left: var(--bar-margin);
  width: var(--bar-width);
  height: 0;
  max-height: var(--bar-height);
  overflow:hidden;
  transition: height 0.4s ease;
   display:flex;
   flex-direction:column;
   justify-content:flex-start;
  color:white;

  /* Transparent glass effect + grey tint */
  background: rgba(150, 150, 150, 0.08); /* slightly grey and transparent */
  backdrop-filter: blur(15px) saturate(140%) brightness(1.05);
  -webkit-backdrop-filter: blur(15px) saturate(140%) brightness(1.05);

  /* Radiant glowing border */
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow:
    0 0 12px rgba(255, 255, 255, 0.05),
    0 0 30px rgba(0, 255, 255, 0.08),
    inset 0 0 15px rgba(255, 255, 255, 0.03);

  border-radius: 20px 20px 10px 10px;
}
    
    .live-bar-inner {
      
      box-sizing: border-box;
    }

    .player-list {
      display: flex;
      flex-direction: column;
         
         }

    .outer-row {
  position: relative;
  width: var(--bar-width);
  height: var(--row-height);
  
  
  
  outline: none !important;
  border-radius: 12px;
  overflow: visible;
  transition: 0.5s ease;
}

    .outer-row.highlight {
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 8px var(--glow-color), inset 0 0 8px var(--glow-color);
    }

    .inner-row {
      position: absolute;
      left: 20%;
      width: 60%;
      height: 100%;
    }

    .player-icon {
      position: absolute;
      left: 0;
      width: 20%;
      height: 100%;
      display: flex;
      
      align-items: center;
      justify-content: center;
    }

    .player-icon img {
      width: var(--icon-size);
  height: var(--icon-size);
  filter: drop-shadow(0 0 10px var(--glow-color));
  border:none;
  box-shadow:none;
  object-fit: contain;
    }

    .player-name {
      position: absolute;
      left: 20%;
      width: 50%;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: var(--font-size);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-points {
      position: absolute;
      right: 0;
      width: 20%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: var(--font-size);
      padding-right: 5%;
    }
  #board {
      position: absolute;
    }

    .tile, .corner-tile {
      position: absolute;
      border-radius: 4px;
      box-shadow: 0 0 6px rgba(255,255,255,0.2);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      background: radial-gradient(circle at center, rgba(60, 140, 255, 0.15), rgba(20, 20, 20, 0.95));
      box-sizing: border-box;
    }

    .corner-tile {
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08), rgba(20, 20, 20, 1));
    }

    .tile-content, .corner-content {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .tile-icon {
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      position: absolute;
    }

    .tile-label, .tile-money {
      color: white;
      text-shadow: 0 0 3px black, 0 0 5px #00f;
      line-height: 1;
      white-space: pre-line;
      text-align: center;
      position: absolute;
    }

    .tile-money {
      font-weight: bold;
      color: #fffacd;
      text-shadow: 0 0 5px #ff0, 0 0 3px black;
    }

    .rotate-right .tile-content {
      transform: rotate(90deg);
    }

    .rotate-left .tile-content {
      transform: rotate(-90deg);
    }

    #pin {
      position: absolute;
      font-size: 28px;
      z-index: 10;
      transition: top 0.25s ease, left 0.25s ease;
    }

    #dice-area {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      perspective: 1000px;
      z-index: 20;
    }

    .dice-container {
      display: flex;
      gap: 20px;
    }

    .dice {
      width: 40px;
      height: 40px;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: transform 1s ease;
    }

    .face {
      position: absolute;
      width: 40px;
      height: 40px;
      background: white;
      border: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }

    .dot {
      width: 6px;
      height: 6px;
      background: black;
      border-radius: 50%;
      margin: 2px;
    }

    button {
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 16px;
      background: #0af;
      color: white;
      border: none;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,255,255,0.4);
      cursor: pointer;
    }

    button:active {
      box-shadow: inset 0 0 10px rgba(0,255,255,0.8);
    }
    #startButton {
  display: none;
  position: fixed;
  bottom: calc(var(--bar-height) + 20px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-size: 20px;
  padding: 6px 20px;
  background: #0af;
  color: white;
  border: none;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,255,255,0.5);
}

.outer-row.new-player {
  animation: slideInUp 0.4s ease forwards;
  opacity: 0;
}

@keyframes slideInUp {
  from {
    transform: translateY(100%);
    opacity: 0;
  }
  to {
    transform: translateY(0%);
    opacity: 1;
  }
}
.player-icon,
.player-name,
.player-points {
  height: 100%;
  display: flex;
  align-items: center;
  padding-top: calc(var(--row-height) * 0.15);
  padding-bottom: calc(var(--row-height) * 0.15);
  box-sizing: border-box;
}
</style>
<body style="background:black; color:white; font-family:sans-serif;">
  <h2 id="status">Connecting to server...</h2>

  <script>
    // Read stored values
    const roomid = localStorage.getItem('roomid');
    const plyrid = parseInt(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');
    const isHost = localStorage.getItem('host') === 'true';
    const isPublic = localStorage.getItem('public') === 'true';

    if (!roomid || !wscode) {
      document.getElementById('status').innerText = "Missing session info. Go back to entry page.";
      throw new Error("Missing localStorage data");
    }

    const socket = new WebSocket("wss://bingo-l95v.onrender.com");

    socket.onopen = () => {
      document.getElementById('status').innerText = "Connected. Sending page_entered...";

      socket.send(JSON.stringify({
        type: 'page_entered',
        host: isHost,
        public: isPublic,
        roomid,
        wscode,
        plyrid
      }));
    };

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      console.log("Received:", data);
      // Handle future game logic
    };

    socket.onclose = () => {
      document.getElementById('status').innerText = "Connection closed.";
    };

    socket.onerror = (err) => {
      console.error("WebSocket error:", err);
      document.getElementById('status').innerText = "Error occurred.";
    };
  </script>
</body>
</html>
