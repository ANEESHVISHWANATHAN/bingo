<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monopoly Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <style>
    body { margin: 0; font-family: sans-serif; background: #f0f0f0; overflow-x: hidden; }
    #topbar {
      display: flex; overflow-x: auto; background: #111; padding: 10px; gap: 16px;
      justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .player {
      display: flex; flex-direction: column; align-items: center; color: white;
      min-width: 70px; padding: 4px; border-radius: 10px;
      background: rgba(255,255,255,0.05); transition: transform 0.2s ease;
    }
    .player:hover { transform: scale(1.05); }
    .player.me { cursor: pointer; background: rgba(255,255,255,0.15); }
    .icon {
      width: 48px; height: 48px; border-radius: 50%; background-size: cover;
      background-position: center; border: 3px solid white;
    }
    .name { font-size: 0.8em; margin-top: 5px; white-space: nowrap; }
    .mic-status { width: 16px; height: 16px; margin-top: 4px; }
    .pin { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }
    #logs {
      position: fixed; bottom: 0; left: 0; width: 100%; max-height: 150px;
      overflow-y: auto; font-size: 12px; background: rgba(0, 0, 0, 0.7);
      color: #0f0; padding: 5px; box-sizing: border-box; font-family: monospace; z-index: 9999;
    }
    #waitingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8); color: white; display: flex;
      align-items: center; justify-content: center; font-size: 24px; z-index: 10000;
    }
    .allowbtn {
      margin-top: 6px; font-size: 10px; color: white;
      border: 1px solid white; padding: 2px 4px; border-radius: 4px;
      background: #222; cursor: pointer;
    }
    #copyBtn {
      position: fixed; bottom: 155px; left: 10px; z-index: 9999;
    }
    @media (min-width: 600px) {
      #topbar { justify-content: space-around; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="logs"></div>
  <div id="waitingOverlay">Waiting for all players...</div>
  <button id="copyBtn" onclick="copyLogs()">Copy Logs</button>

  <script>
    const log = (msg) => {
      const logs = document.getElementById('logs');
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    };

    function copyLogs() {
      const logs = document.getElementById('logs').innerText;
      navigator.clipboard.writeText(logs).then(() => {
        alert("Logs copied to clipboard");
      }).catch(err => alert("Copy failed: " + err));
    }

    const ws = new WebSocket('wss://bingo-l95v.onrender.com');
    const roomid = localStorage.getItem('roomid');
    const plyrid = Number(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');

    let rtc = {}, localStream = null;
    let remoteDescSet = {}, pendingCandidates = {};
    let voiceAllowed = false, peerData = [];

    ws.onopen = () => {
      log('WebSocket opened');
      ws.send(JSON.stringify({
        type: 'page_entered',
        roomid, plyrid, wscode, game: 'monopoly', wsindex: 2
      }));
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'topbar') {
        log('Received topbar data');
        document.getElementById('waitingOverlay').style.display = 'none';
        peerData = msg.data;

        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
          });
          localStream.getAudioTracks()[0].enabled = false;
          voiceAllowed = true;
          log('Mic access granted (initial)');
        } catch (err) {
          log('Mic denied: ' + err.message);
        }

        ws.send(JSON.stringify({
          type: 'voiceaccess',
          roomid, plyrid, allow: voiceAllowed
        }));
      }

      if (msg.type === 'voiceaccessready') {
        const allowed = msg.allowed;
        const topbar = document.getElementById('topbar');
        topbar.innerHTML = '';

        allowed.forEach(p => {
          const el = document.createElement('div');
          el.className = 'player';
          el.id = `player-${p.plyrid}`;
          if (p.plyrid === plyrid) el.classList.add('me');

          const icon = document.createElement('div');
          icon.className = 'icon';
          icon.style.backgroundImage = `url(${p.icon})`;
          icon.style.borderColor = p.color;

          const name = document.createElement('div');
          name.className = 'name';
          name.textContent = p.username;

          const micImg = document.createElement('img');
          micImg.className = 'mic-status';
          micImg.src = 'muted.jpg';

          const pin = document.createElement('div');
          pin.className = 'pin';
          pin.style.background = p.color;

          el.appendChild(icon);
          el.appendChild(name);
          el.appendChild(micImg);
          el.appendChild(pin);

          if (p.plyrid === plyrid && voiceAllowed) {
            el.onclick = () => {
              const track = localStream.getAudioTracks()[0];
              track.enabled = !track.enabled;
              micImg.src = track.enabled ? 'UNMUTED.jpg' : 'muted.jpg';
              log('Mic toggled: ' + (track.enabled ? 'UNMUTED' : 'MUTED'));
            };
          }

          if (p.plyrid === plyrid && !voiceAllowed) {
            const btn = document.createElement('div');
            btn.className = 'allowbtn';
            btn.textContent = 'Allow';
            btn.onclick = async () => {
              try {
                localStream = await navigator.mediaDevices.getUserMedia({
                  audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                localStream.getAudioTracks()[0].enabled = false;
                voiceAllowed = true;
                log('Mic granted on Allow click');
                ws.send(JSON.stringify({ type: 'voiceaccessjoin', roomid, plyrid }));
              } catch (e) {
                log('Mic failed: ' + e.message);
              }
            };
            el.appendChild(btn);
          }

          topbar.appendChild(el);
        });

        for (const other of allowed.filter(p => p.plyrid !== plyrid)) {
          if (plyrid < other.plyrid) initiateCall(other.plyrid);
        }
      }

      if (msg.type === 'voiceaccessjoin') {
        const p = msg.player;
        if (!peerData.some(d => d.plyrid === p.plyrid)) peerData.push(p);
        if (plyrid < p.plyrid) initiateCall(p.plyrid);

        const el = document.getElementById(`player-${p.plyrid}`);
        if (el) {
          el.querySelector('.mic-status').src = 'muted.jpg';
          el.querySelector('.allowbtn')?.remove();
        }
      }

      if (msg.type === 'offer') {
        log('Received offer from ' + msg.plyrid);
        const pc = createPeerConnection(msg.plyrid);
        remoteDescSet[msg.plyrid] = false;
        pendingCandidates[msg.plyrid] = [];

        if (!localStream && voiceAllowed) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({
              audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
            });
            localStream.getAudioTracks()[0].enabled = false;
            log('Mic granted for answer');
          } catch (e) {
            log('Mic denied: ' + e.message);
          }
        }

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
        remoteDescSet[msg.plyrid] = true;
        log('Remote description set for ' + msg.plyrid);

        if (pendingCandidates[msg.plyrid]) {
          for (const cand of pendingCandidates[msg.plyrid]) {
            try {
              await pc.addIceCandidate(new RTCIceCandidate(cand));
              log('Flushed ICE from ' + msg.plyrid);
            } catch (e) {
              log('ICE flush error: ' + e.message);
            }
          }
          delete pendingCandidates[msg.plyrid];
        }

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({
          type: 'answer',
          target: msg.plyrid,
          answer, roomid, plyrid
        }));
        log('Sent answer to ' + msg.plyrid);
      }

      if (msg.type === 'answer') {
        log('Received answer from ' + msg.plyrid);
        const pc = rtc[msg.plyrid];
        if (pc) {
          await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
          remoteDescSet[msg.plyrid] = true;
          log('Remote description set (answer) for ' + msg.plyrid);

          if (pendingCandidates[msg.plyrid]) {
            for (const cand of pendingCandidates[msg.plyrid]) {
              try {
                await pc.addIceCandidate(new RTCIceCandidate(cand));
                log('Flushed ICE from ' + msg.plyrid);
              } catch (e) {
                log('ICE add error: ' + e.message);
              }
            }
            delete pendingCandidates[msg.plyrid];
          }
        }
      }

      if (msg.type === 'icecandidate') {
        const pc = rtc[msg.plyrid];
        if (pc && msg.candidate) {
          if (remoteDescSet[msg.plyrid]) {
            try {
              await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
              log('Added ICE candidate from ' + msg.plyrid);
            } catch (e) {
              log('ICE error: ' + e.message);
            }
          } else {
            (pendingCandidates[msg.plyrid] ||= []).push(msg.candidate);
            log('Buffered ICE from ' + msg.plyrid);
          }
        }
      }
    };

    function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection({
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: [
              "turn:relay.metered.ca:443?transport=tcp",
              "turn:relay.metered.ca:80?transport=udp"
            ],
            username: "openai",
            credential: "openai"
          }
        ]
      });

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = event => {
        if (targetId === plyrid) return;
        let audio = document.getElementById(`audio-${targetId}`);
        if (!audio) {
          audio = document.createElement('audio');
          audio.id = `audio-${targetId}`;
          audio.autoplay = true;
          audio.playsInline = true;
          document.body.appendChild(audio);
        }
        audio.srcObject = event.streams[0];
        audio.play().catch(() => {
          document.body.addEventListener('click', () => {
            audio.play().catch(e => log('Audio play error: ' + e.message));
          }, { once: true });
        });
      };

      pc.onicecandidate = event => {
        if (event.candidate) {
          ws.send(JSON.stringify({
            type: 'icecandidate',
            target: targetId,
            candidate: event.candidate,
            roomid, plyrid
          }));
          log('Sent ICE candidate to ' + targetId);
        }
      };

      pc.onconnectionstatechange = () => {
        log(`ConnectionState ${plyrid} → ${targetId}: ${pc.connectionState}`);
      };

      pc.oniceconnectionstatechange = () => {
        log(`ICEConnectionState ${plyrid} → ${targetId}: ${pc.iceConnectionState}`);
      };

      rtc[targetId] = pc;
      return pc;
    }

    async function initiateCall(targetId) {
      const pc = createPeerConnection(targetId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({
        type: 'offer',
        target: targetId,
        offer, roomid, plyrid
      }));
      log('Sent offer to ' + targetId);
    }
  </script>
</body>
</html>
