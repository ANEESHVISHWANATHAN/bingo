<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
      overflow-x: hidden;
    }
    #topbar {
      display: flex;
      overflow-x: auto;
      background: #111;
      padding: 10px;
      gap: 16px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      min-width: 70px;
      padding: 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      transition: transform 0.2s ease;
    }
    .player:hover {
      transform: scale(1.05);
    }
    .player.me {
      cursor: pointer;
      background: rgba(255,255,255,0.15);
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 3px solid white;
    }
    .name {
      font-size: 0.8em;
      margin-top: 5px;
      white-space: nowrap;
    }
    .mic-status {
      width: 16px;
      height: 16px;
      margin-top: 4px;
    }
    .pin {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
    }
    #logs {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #0f0;
      padding: 5px;
      box-sizing: border-box;
      font-family: monospace;
      z-index: 9999;
    }
    @media (min-width: 600px) {
      #topbar {
        justify-content: space-around;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="logs"></div>

  <script>
    const log = (msg) => {
      const logs = document.getElementById('logs');
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    };

    const ws = new WebSocket('wss://bingo-l95v.onrender.com');
    const roomid = localStorage.getItem('roomid');
    const plyrid = Number(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');
    const username = localStorage.getItem('username');
    const icon = localStorage.getItem('icon');

    let rtc = {};
    let localStream = null;
    let connectedTo = new Set();

    ws.onopen = () => {
      log('WebSocket opened');
      ws.send(JSON.stringify({
        type: 'page_entered',
        roomid, plyrid, wscode, game: 'monopoly', wsindex: 2
      }));
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'topbar') {
        log('Received topbar data');
        const topbar = document.getElementById('topbar');
        topbar.innerHTML = '';
        connectedTo = new Set();

        const data = msg.data;
        const me = data.find(p => p.plyrid === plyrid);
        const voiceEnabled = me?.voice;

        if (voiceEnabled && !localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log('Mic access granted');
          } catch (err) {
            log('Mic access denied: ' + err.message);
          }
        }

        data.forEach(player => {
          const el = document.createElement('div');
          el.className = 'player';
          el.id = `player-${player.plyrid}`;
          if (player.plyrid === plyrid) el.classList.add('me');

          const iconDiv = document.createElement('div');
          iconDiv.className = 'icon';
          iconDiv.style.backgroundImage = `url(${player.icon})`;
          iconDiv.style.borderColor = player.color;

          const nameDiv = document.createElement('div');
          nameDiv.className = 'name';
          nameDiv.textContent = player.username;

          const micImg = document.createElement('img');
          micImg.className = 'mic-status';
          micImg.src = player.voice ? 'UNMUTED.jpg' : 'muted.jpg';

          const pinDiv = document.createElement('div');
          pinDiv.className = 'pin';
          pinDiv.style.background = player.color;

          el.appendChild(iconDiv);
          el.appendChild(nameDiv);
          el.appendChild(micImg);
          el.appendChild(pinDiv);

          if (player.plyrid === plyrid && player.voice) {
            el.onclick = () => {
              if (!localStream) return;
              const audioTrack = localStream.getAudioTracks()[0];
              audioTrack.enabled = !audioTrack.enabled;
              micImg.src = audioTrack.enabled ? 'UNMUTED.jpg' : 'muted.jpg';
              log("Mic toggled: " + (audioTrack.enabled ? 'UNMUTED' : 'MUTED'));
            };
          }

          topbar.appendChild(el);
        });

        for (const other of data.filter(p => p.voice && p.plyrid !== plyrid)) {
          if (!rtc[other.plyrid]) {
            log('Initiating call to ' + other.plyrid);
            await initiateCall(other.plyrid);
          }
        }
      }

      if (msg.type === 'offer') {
        log('Received offer from ' + msg.plyrid);
        const pc = createPeerConnection(msg.plyrid);

        if (!localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log('Mic access granted for answering');
          } catch (err) {
            log('Mic access denied for answering: ' + err.message);
          }
        }

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({
          type: 'answer',
          target: msg.plyrid,
          answer,
          roomid,
          plyrid
        }));
        log('Sent answer to ' + msg.plyrid);
      }

      if (msg.type === 'answer') {
        log('Received answer from ' + msg.plyrid);
        const pc = rtc[msg.plyrid];
        if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
      }

      if (msg.type === 'icecandidate') {
        const pc = rtc[msg.plyrid];
        if (pc && msg.candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
            log('Added ICE candidate from ' + msg.plyrid);
          } catch (err) {
            log('ICE error: ' + err.message);
          }
        }
      }
    };

    function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection();

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = event => {
        log('Received audio track from ' + targetId);

        let audio = document.getElementById(`audio-${targetId}`);
        if (!audio) {
          audio = document.createElement('audio');
          audio.id = `audio-${targetId}`;
          audio.autoplay = true;
          audio.playsInline = true;
          document.body.appendChild(audio);
        }

        audio.srcObject = event.streams[0];
        audio.play().catch(() => {
          document.body.addEventListener('click', () => {
            audio.play().catch(e => log('Audio play blocked: ' + e.message));
          }, { once: true });
        });
      };

      pc.onicecandidate = event => {
        if (event.candidate) {
          ws.send(JSON.stringify({
            type: 'icecandidate',
            target: targetId,
            candidate: event.candidate,
            roomid,
            plyrid
          }));
          log('Sent ICE candidate to ' + targetId);
        }
      };

      pc.onconnectionstatechange = () => {
        log(`Connection (${plyrid} → ${targetId}) state: ${pc.connectionState}`);
      };

      rtc[targetId] = pc;
      return pc;
    }

    async function initiateCall(targetId) {
      const pc = createPeerConnection(targetId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({
        type: 'offer',
        target: targetId,
        offer,
        roomid,
        plyrid
      }));
      log('Sent offer to ' + targetId);
    }
  </script>
</body>
</html>
