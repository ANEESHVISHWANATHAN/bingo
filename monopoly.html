<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    body { margin: 0; font-family: sans-serif; background: #f0f0f0; overflow-x: hidden; }
    #topbar {
      display: flex; overflow-x: auto; background: #111; padding: 10px; gap: 16px;
      justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .player {
      display: flex; flex-direction: column; align-items: center; color: white;
      min-width: 70px; padding: 4px; border-radius: 10px;
      background: rgba(255,255,255,0.05); transition: transform 0.2s ease;
    }
    .player:hover { transform: scale(1.05); }
    .player.me { cursor: pointer; background: rgba(255,255,255,0.15); }
    .icon {
      width: 48px; height: 48px; border-radius: 50%; background-size: cover;
      background-position: center; border: 3px solid white;
    }
    .name { font-size: 0.8em; margin-top: 5px; white-space: nowrap; }
    .mic-status { width: 16px; height: 16px; margin-top: 4px; }
    .pin { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }
    #logs {
      position: fixed; bottom: 0; left: 0; width: 100%; max-height: 150px;
      overflow-y: auto; font-size: 12px; background: rgba(0, 0, 0, 0.7);
      color: #0f0; padding: 5px; box-sizing: border-box; font-family: monospace; z-index: 9999;
    }
    #waitingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8); color: white; display: flex;
      align-items: center; justify-content: center; font-size: 24px; z-index: 10000;
    }
    @media (min-width: 600px) {
      #topbar { justify-content: space-around; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="logs"></div>
  <div id="waitingOverlay">Waiting for all players...</div>

  <script>
    const log = (msg) => {
      const logs = document.getElementById('logs');
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    };

    const ws = new WebSocket('wss://bingo-l95v.onrender.com');
    const roomid = localStorage.getItem('roomid');
    const plyrid = Number(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');

    let rtc = {}, localStream = null, connectedTo = new Set();
    let remoteDescSet = {}, pendingCandidates = {};

    ws.onopen = () => {
      log('WebSocket opened');
      ws.send(JSON.stringify({
        type: 'page_entered',
        roomid, plyrid, wscode, game: 'monopoly', wsindex: 2
      }));
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'topbar') {
        log('Received topbar data');
        document.getElementById('waitingOverlay').style.display = 'none';

        const topbar = document.getElementById('topbar');
        topbar.innerHTML = '';
        connectedTo = new Set();

        const seen = new Set();
        const data = msg.data.filter(p => {
          if (seen.has(p.plyrid)) return false;
          seen.add(p.plyrid);
          return true;
        });

        const me = data.find(p => p.plyrid === plyrid);
        const voiceEnabled = me?.voice;

        if (voiceEnabled && !localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
              }
            });
            localStream.getAudioTracks()[0].enabled = false;
            log('Mic access granted');
          } catch (err) {
            log('Mic access denied: ' + err.message);
          }
        }

        data.forEach(player => {
          const el = document.createElement('div');
          el.className = 'player';
          el.id = `player-${player.plyrid}`;
          if (player.plyrid === plyrid) el.classList.add('me');

          const iconDiv = document.createElement('div');
          iconDiv.className = 'icon';
          iconDiv.style.backgroundImage = `url(${player.icon})`;
          iconDiv.style.borderColor = player.color;

          const nameDiv = document.createElement('div');
          nameDiv.className = 'name';
          nameDiv.textContent = player.username;

          const micImg = document.createElement('img');
          micImg.className = 'mic-status';
          micImg.src = player.voice ? 'UNMUTED.jpg' : 'muted.jpg';

          const pinDiv = document.createElement('div');
          pinDiv.className = 'pin';
          pinDiv.style.background = player.color;

          el.appendChild(iconDiv);
          el.appendChild(nameDiv);
          el.appendChild(micImg);
          el.appendChild(pinDiv);

          if (player.plyrid === plyrid && player.voice) {
            el.onclick = () => {
              if (!localStream) return;
              const track = localStream.getAudioTracks()[0];
              track.enabled = !track.enabled;
              micImg.src = track.enabled ? 'UNMUTED.jpg' : 'muted.jpg';
              log("Mic toggled: " + (track.enabled ? 'UNMUTED' : 'MUTED'));
            };
          }

          topbar.appendChild(el);
        });

        for (const other of data.filter(p => p.voice && p.plyrid !== plyrid)) {
          if (!rtc[other.plyrid] && plyrid < other.plyrid) {
            log('Initiating call to ' + other.plyrid);
            await initiateCall(other.plyrid);
          }
        }
      }

      if (msg.type === 'offer') {
        log('Received offer from ' + msg.plyrid);
        const pc = createPeerConnection(msg.plyrid);
        remoteDescSet[msg.plyrid] = false;
        pendingCandidates[msg.plyrid] = [];

        if (!localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
              }
            });
            localStream.getAudioTracks()[0].enabled = false;
            log('Mic access granted for answering');
          } catch (err) {
            log('Mic access denied: ' + err.message);
          }
        }

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
        remoteDescSet[msg.plyrid] = true;

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({
          type: 'answer',
          target: msg.plyrid,
          answer, roomid, plyrid
        }));
        log('Sent answer to ' + msg.plyrid);

        for (const cand of pendingCandidates[msg.plyrid]) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(cand));
            log('Flushed ICE from ' + msg.plyrid);
          } catch (e) {
            log('Flush ICE failed: ' + e.message);
          }
        }
        delete pendingCandidates[msg.plyrid];
      }

      if (msg.type === 'answer') {
        log('Received answer from ' + msg.plyrid);
        const pc = rtc[msg.plyrid];
        if (pc) {
          await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
          remoteDescSet[msg.plyrid] = true;
          if (pendingCandidates[msg.plyrid]) {
            for (const cand of pendingCandidates[msg.plyrid]) {
              try {
                await pc.addIceCandidate(new RTCIceCandidate(cand));
                log('Flushed ICE from ' + msg.plyrid);
              } catch (e) {
                log('Flush ICE failed: ' + e.message);
              }
            }
            delete pendingCandidates[msg.plyrid];
          }
        }
      }

      if (msg.type === 'icecandidate') {
        const pc = rtc[msg.plyrid];
        if (pc && msg.candidate) {
          if (remoteDescSet[msg.plyrid]) {
            try {
              await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
              log('Added ICE candidate from ' + msg.plyrid);
            } catch (err) {
              log('ICE error: ' + err.message);
            }
          } else {
            (pendingCandidates[msg.plyrid] ||= []).push(msg.candidate);
            log('Buffered ICE from ' + msg.plyrid);
          }
        }
      }
    };

    function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection({
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: "turn:relay.metered.ca:443",
            username: "openai",
            credential: "openai"
          }
        ]
      });

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = event => {
        log('Received audio track from ' + targetId);
        if (targetId === plyrid) return;

        let audio = document.getElementById(`audio-${targetId}`);
        if (!audio) {
          audio = document.createElement('audio');
          audio.id = `audio-${targetId}`;
          audio.autoplay = true;
          audio.playsInline = true;
          document.body.appendChild(audio);
        }

        audio.srcObject = event.streams[0];
        audio.play().catch(() => {
          document.body.addEventListener('click', () => {
            audio.play().catch(e => log('Audio play blocked: ' + e.message));
          }, { once: true });
        });
      };

      pc.onicecandidate = event => {
        if (event.candidate) {
          ws.send(JSON.stringify({
            type: 'icecandidate',
            target: targetId,
            candidate: event.candidate,
            roomid, plyrid
          }));
          log('Sent ICE candidate to ' + targetId);
        }
      };

      pc.onconnectionstatechange = () => {
        log(`Connection (${plyrid} → ${targetId}) state: ${pc.connectionState}`);
      };

      rtc[targetId] = pc;
      return pc;
    }

    async function initiateCall(targetId) {
      const pc = createPeerConnection(targetId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({
        type: 'offer',
        target: targetId,
        offer, roomid, plyrid
      }));
      log('Sent offer to ' + targetId);
    }
  </script>
</body>
</html>
