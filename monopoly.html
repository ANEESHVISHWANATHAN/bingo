<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly Game</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    #topbar {
      display: flex;
      overflow-x: auto;
      background: #222;
      padding: 10px;
      gap: 20px;
      justify-content: center;
    }
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      cursor: default;
    }
    .player.me {
      cursor: pointer;
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 2px solid white;
    }
    .name {
      font-size: 0.8em;
      margin-top: 4px;
    }
    .mic-status {
      font-size: 0.7em;
      margin-top: 2px;
      color: #aaa;
    }
    .pin {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
    }
    @media (min-width: 600px) {
      #topbar {
        justify-content: space-around;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>

  <script>
    const ws = new WebSocket('wss://bingo-l95v.onrender.com');
    const roomid = localStorage.getItem('roomid');
    const plyrid = Number(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');
    const username = localStorage.getItem('username');
    const icon = localStorage.getItem('icon');
    const rtc = {};
    let localStream = null;

    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: 'page_entered',
        roomid, plyrid, wscode, game: 'monopoly', wsindex: 2
      }));
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'topbar') {
        const topbar = document.getElementById('topbar');
        topbar.innerHTML = '';
        const data = msg.data;

        const me = data.find(p => p.plyrid === plyrid);
        const voiceEnabled = me?.voice;

        if (voiceEnabled) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('Mic access granted');
          } catch (err) {
            console.warn('Mic access denied', err);
          }
        }

        data.forEach(player => {
          const el = document.createElement('div');
          el.className = 'player';
          if (player.plyrid === plyrid) el.classList.add('me');

          const iconDiv = document.createElement('div');
          iconDiv.className = 'icon';
          iconDiv.style.backgroundImage = `url(${player.icon})`;
          iconDiv.style.borderColor = player.color;

          const nameDiv = document.createElement('div');
          nameDiv.className = 'name';
          nameDiv.textContent = player.username;

          const micDiv = document.createElement('div');
          micDiv.className = 'mic-status';
          micDiv.textContent = player.voice ? 'UM' : 'M';

          const pinDiv = document.createElement('div');
          pinDiv.className = 'pin';
          pinDiv.style.background = player.color;

          el.appendChild(iconDiv);
          el.appendChild(nameDiv);
          el.appendChild(micDiv);
          el.appendChild(pinDiv);

          // Only allow current user to toggle mic
          if (player.plyrid === plyrid && player.voice) {
            el.style.cursor = 'pointer';
            el.onclick = () => {
              if (!localStream) return;

              const audioTrack = localStream.getAudioTracks()[0];
              audioTrack.enabled = !audioTrack.enabled;
              micDiv.textContent = audioTrack.enabled ? 'UM' : 'M';
            };
          }

          topbar.appendChild(el);
        });

        // Placeholder rtc setup
        const voicePlayers = data.filter(p => p.voice);
        voicePlayers.forEach(p => {
          if (p.plyrid !== plyrid) {
            rtc[p.plyrid] = {
              conn: null, // to be setup via signaling
              stream: null
            };
          }
        });
      }
    };
  </script>
</body>
</html>
