<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
      overflow-x: hidden;
    }
    #topbar {
      display: flex;
      overflow-x: auto;
      background: #111;
      padding: 10px;
      gap: 16px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      min-width: 70px;
      padding: 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      transition: transform 0.2s ease;
    }
    .player:hover {
      transform: scale(1.05);
    }
    .player.me {
      cursor: pointer;
      background: rgba(255,255,255,0.15);
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 3px solid white;
    }
    .name {
      font-size: 0.8em;
      margin-top: 5px;
      white-space: nowrap;
    }
    .mic-status {
      width: 16px;
      height: 16px;
      margin-top: 4px;
    }
    .pin {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
    }
    video {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 120px;
      height: 90px;
      object-fit: cover;
      z-index: 999;
      border: 2px solid #333;
      background: black;
    }
    @media (min-width: 600px) {
      #topbar {
        justify-content: space-around;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>

  <script>
    const ws = new WebSocket('wss://bingo-l95v.onrender.com');
    const roomid = localStorage.getItem('roomid');
    const plyrid = Number(localStorage.getItem('plyrid'));
    const wscode = localStorage.getItem('wscode');
    const username = localStorage.getItem('username');
    const icon = localStorage.getItem('icon');

    let rtc = {};
    let localStream = null;
    let connectedTo = new Set();

    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: 'page_entered',
        roomid, plyrid, wscode, game: 'monopoly', wsindex: 2
      }));
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'topbar') {
        const topbar = document.getElementById('topbar');
        topbar.innerHTML = '';
        connectedTo = new Set();

        const data = msg.data;
        const me = data.find(p => p.plyrid === plyrid);
        const voiceEnabled = me?.voice;

        if (voiceEnabled && !localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            console.log("Media granted. Tracks:", localStream.getTracks().map(t => t.kind));
            showLocalVideo(localStream);
          } catch (err) {
            console.warn('Media denied', err);
          }
        }

        data.forEach(player => {
          const el = document.createElement('div');
          el.className = 'player';
          el.id = `player-${player.plyrid}`;
          if (player.plyrid === plyrid) el.classList.add('me');

          const iconDiv = document.createElement('div');
          iconDiv.className = 'icon';
          iconDiv.style.backgroundImage = `url(${player.icon})`;
          iconDiv.style.borderColor = player.color;

          const nameDiv = document.createElement('div');
          nameDiv.className = 'name';
          nameDiv.textContent = player.username;

          const micImg = document.createElement('img');
          micImg.className = 'mic-status';
          micImg.src = player.voice ? 'UNMUTED.jpg' : 'muted.jpg';

          const pinDiv = document.createElement('div');
          pinDiv.className = 'pin';
          pinDiv.style.background = player.color;

          el.appendChild(iconDiv);
          el.appendChild(nameDiv);
          el.appendChild(micImg);
          el.appendChild(pinDiv);

          if (player.plyrid === plyrid && player.voice) {
            el.onclick = () => {
              if (!localStream) return;
              const audioTrack = localStream.getAudioTracks()[0];
              audioTrack.enabled = !audioTrack.enabled;
              micImg.src = audioTrack.enabled ? 'UNMUTED.jpg' : 'muted.jpg';
              console.log("Mic toggled:", audioTrack.enabled);
            };
          }

          topbar.appendChild(el);
        });

        for (const other of data.filter(p => p.voice && p.plyrid !== plyrid)) {
          if (!rtc[other.plyrid]) await initiateCall(other.plyrid);
        }
      }

      if (msg.type === 'offer') {
        const pc = createPeerConnection(msg.plyrid);

        if (!localStream) {
          try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            showLocalVideo(localStream);
          } catch (err) {
            console.warn('Media denied for answering', err);
          }
        }

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({
          type: 'answer',
          target: msg.plyrid,
          answer,
          roomid,
          plyrid
        }));
      }

      if (msg.type === 'answer') {
        const pc = rtc[msg.plyrid];
        if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
      }

      if (msg.type === 'icecandidate') {
        const pc = rtc[msg.plyrid];
        if (pc && msg.candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
          } catch (err) {
            console.warn('ICE error', err);
          }
        }
      }
    };

    function createPeerConnection(targetId) {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = event => {
        console.log(`Received track from ${targetId}`, event.streams[0]);

        let video = document.getElementById(`video-${targetId}`);
        if (!video) {
          video = document.createElement('video');
          video.id = `video-${targetId}`;
          video.autoplay = true;
          video.playsInline = true;
          video.width = 120;
          video.height = 90;
          document.body.appendChild(video);
        }

        video.srcObject = event.streams[0];
        video.play().catch(() => {
          document.body.addEventListener('click', () => {
            video.play().catch(e => console.warn('Still blocked', e));
          }, { once: true });
        });
      };

      pc.onicecandidate = event => {
        if (event.candidate) {
          ws.send(JSON.stringify({
            type: 'icecandidate',
            target: targetId,
            candidate: event.candidate,
            roomid,
            plyrid
          }));
        }
      };

      pc.onconnectionstatechange = () => {
        console.log(`Connection state (${plyrid} -> ${targetId}):`, pc.connectionState);
      };

      rtc[targetId] = pc;
      return pc;
    }

    async function initiateCall(targetId) {
      const pc = createPeerConnection(targetId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({
        type: 'offer',
        target: targetId,
        offer,
        roomid,
        plyrid
      }));
    }

    function showLocalVideo(stream) {
      let video = document.getElementById('my-video');
      if (!video) {
        video = document.createElement('video');
        video.id = 'my-video';
        video.muted = true;
        video.autoplay = true;
        video.playsInline = true;
        document.body.appendChild(video);
      }
      video.srcObject = stream;
    }
  </script>
</body>
</html>
